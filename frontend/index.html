<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TradingAgents-CN - 多智能体股票分析学习平台</title>
    <meta name="description" content="现代化的多智能体股票分析学习平台，支持A股、美股、港股分析" />
    <meta name="keywords" content="股票分析,AI分析,多智能体,TradingAgents" />
    <meta name="author" content="TradingAgents-CN Team" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tradingagents.cn/" />
    <meta property="og:title" content="TradingAgents-CN - 多智能体股票分析学习平台" />
    <meta property="og:description" content="现代化的多智能体股票分析学习平台，支持A股、美股、港股分析" />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://tradingagents.cn/" />
    <meta property="twitter:title" content="TradingAgents-CN - 多智能体股票分析学习平台" />
    <meta property="twitter:description" content="现代化的多智能体股票分析学习平台，支持A股、美股、港股分析" />
    <meta property="twitter:image" content="/og-image.png" />

    <!-- 预加载关键资源 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- 字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    
    <!-- 主题色 -->
    <meta name="theme-color" content="#409EFF" />
    
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="TradingAgents-CN" />
    <link rel="apple-touch-icon" href="/logo.svg" />
    <style>
      body {
        background: #0c1320;
      }

      .boot-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: grid;
        place-items: center;
        padding: 24px;
        color: #dce7f7;
        background: linear-gradient(180deg, #0c1320 0%, #0d1521 52%, #101722 100%);
        transition: opacity 0.28s ease, visibility 0.28s ease;
      }

      .boot-splash--hidden {
        opacity: 0;
        visibility: hidden;
      }

      .boot-card {
        width: min(520px, 100%);
        padding: 24px;
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 8px;
        background: rgba(11, 18, 32, 0.88);
        box-shadow: 0 24px 72px rgba(0, 0, 0, 0.34);
      }

      .boot-title {
        margin: 0;
        font-size: 22px;
        font-weight: 760;
        letter-spacing: 0;
        color: #f6f9ff;
      }

      .boot-subtitle {
        margin: 8px 0 18px;
        color: #92a0b8;
        line-height: 1.6;
      }

      .boot-progress {
        position: relative;
        overflow: hidden;
        height: 6px;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.16);
      }

      .boot-progress::after {
        content: "";
        position: absolute;
        inset: 0 auto 0 0;
        width: 42%;
        border-radius: inherit;
        background: linear-gradient(90deg, #37d4b5, #60a5fa);
        animation: boot-progress 1.25s ease-in-out infinite;
      }

      .boot-steps {
        display: grid;
        gap: 8px;
        margin-top: 18px;
        color: #a9b8d0;
        font-size: 13px;
      }

      .boot-step {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .boot-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #37d4b5;
        box-shadow: 0 0 0 4px rgba(55, 212, 181, 0.1);
      }

      @keyframes boot-progress {
        0% {
          transform: translateX(-110%);
        }
        55% {
          transform: translateX(95%);
        }
        100% {
          transform: translateX(245%);
        }
      }
    </style>
  </head>
  <body>
    <div id="app-boot-splash" class="boot-splash" role="status" aria-live="polite">
      <div class="boot-card">
        <h1 class="boot-title">正在加载投研工作台</h1>
        <p class="boot-subtitle">首次打开会加载地图、图表和分析组件，请稍等片刻。</p>
        <div class="boot-progress" aria-hidden="true"></div>
        <div class="boot-steps">
          <div class="boot-step"><span class="boot-dot"></span><span>加载前端资源</span></div>
          <div class="boot-step"><span class="boot-dot"></span><span>连接市场情报服务</span></div>
          <div class="boot-step"><span class="boot-dot"></span><span>准备地图与报告看板</span></div>
        </div>
      </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
