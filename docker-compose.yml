version: '3.8'
services:
  mongodb:
    image: mongo:4.4
    container_name: tradingagents-mongodb
    restart: unless-stopped
    ports:
      - "127.0.0.1:27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: tradingagents123
      MONGO_INITDB_DATABASE: tradingagent
    volumes:
      - mongodb_data:/data/db
    networks:
      - tradingagents-network

  redis:
    image: redis:7-alpine
    container_name: tradingagents-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass tradingagents123
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - tradingagents-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: tradingagents-backend:v1.0.0-preview
    container_name: tradingagents-backend
    restart: unless-stopped
    depends_on:
      - mongodb
      - redis
    env_file:
      - .env
    environment:
      - MONGODB_HOST=tradingagents-mongodb
      - REDIS_HOST=tradingagents-redis
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Shanghai
      - ANALYSIS_NEWS_MAX_AGE_DAYS=${ANALYSIS_NEWS_MAX_AGE_DAYS:-7}
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - tradingagents-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: ""
    image: tradingagents-frontend:v1.0.0-preview
    container_name: tradingagents-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3000:80"
    networks:
      - tradingagents-network

volumes:
  mongodb_data:
  redis_data:

networks:
  tradingagents-network:
    driver: bridge
