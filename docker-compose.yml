version: '3.8'

services:
  app:
    build: .
    container_name: a-share-platform
    ports:
      - "8501:8501"
    volumes:
      - ./.env:/app/.env
      - streamlit_cache:/app/.streamlit
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: a-share-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  streamlit_cache:
